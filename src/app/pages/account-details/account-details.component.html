<div class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 transition-colors duration-200">

  <header class="flex-shrink-0 px-8 py-6 flex flex-col md:flex-row md:items-center justify-between z-10 gap-4">

    <div class="flex items-center gap-4">
      <button *ngIf="isStaffRole" (click)="goBack()"
        class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300 font-bold shadow-sm flex-shrink-0">
        <i class="pi pi-angle-left text-xl"></i>
      </button>

      <div>
        <h1 class="text-[26px] font-bold text-[#2c3e50] dark:text-white m-0 leading-tight">Account Details</h1>
        <p *ngIf="isStaffRole" class="text-sm font-medium text-gray-500 dark:text-gray-400 m-0 mt-0.5">
          Idea Feed / Account Details
        </p>
      </div>
    </div>

  </header>

  <main class="flex-1 overflow-y-auto px-6 pb-12">
    <div class="max-w-2xl mx-auto space-y-4">

      <div
        class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-center gap-8 shadow-sm border border-gray-200/50 dark:border-gray-700">

        <input type="file" accept="image/*" #fileInput class="hidden" (change)="onProfileSelected($event)" />

        <div
          class="w-28 h-28 rounded-full border-4 border-[#2c3e50] dark:border-gray-500 overflow-hidden flex items-center justify-center bg-white dark:bg-gray-700 flex-shrink-0">
          <img *ngIf="profilePictureUrl; else defaultUserIcon" [src]="profilePictureUrl" alt="Profile"
            class="w-full h-full object-cover" />
          <ng-template #defaultUserIcon>
            <i class="pi pi-user text-4xl text-gray-400 dark:text-gray-300"></i>
          </ng-template>
        </div>

        <button (click)="fileInput.click()"
          class="px-6 py-2.5 bg-[#6FCBF0] hover:bg-[#5dbfe4] text-gray-900 font-bold rounded-xl shadow-sm transition-colors whitespace-nowrap">
          Update Profile Picture
        </button>
      </div>

      <div
        class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-200/50 dark:border-gray-700 relative">

        <button *ngIf="!isEditing" (click)="toggleEdit()"
          class="absolute top-6 right-6 text-gray-600 dark:text-gray-300 hover:text-[#2c3e50] dark:hover:text-white transition-colors">
          <i class="pi pi-pencil text-xl"></i>
        </button>

        <div class="space-y-6">

          <div class="flex items-start gap-4">
            <i class="pi pi-user text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Full Name</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffName }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="text" [(ngModel)]="user.staffName"
                class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div class="flex items-start gap-4">
            <i class="pi pi-phone text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Phone Number</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffPhNo }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="text" [(ngModel)]="user.staffPhNo"
                class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div class="flex items-start gap-4">
            <i class="pi pi-envelope text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Email Address</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffEmail }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="email" [(ngModel)]="user.staffEmail"
                class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div *ngIf="isEditing" class="flex justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700 mt-4">
            <button (click)="toggleEdit()"
              class="px-5 py-2 text-gray-600 dark:text-gray-300 font-semibold hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">
              Cancel
            </button>
            <button (click)="saveChanges()"
              class="px-5 py-2 bg-[#6FCBF0] hover:bg-[#5dbfe4] text-gray-900 font-bold rounded-lg shadow-sm transition-colors">
              Save Profile
            </button>
          </div>

          <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex items-center justify-center">
            <button (click)="openPasswordModal()"
              class="px-6 py-2.5 bg-gray-800 dark:bg-gray-700 text-white text-sm font-bold rounded-xl shadow-sm hover:bg-gray-900 dark:hover:bg-gray-600 transition-all duration-200 flex items-center gap-2 active:scale-[0.98]">
              <i class="pi pi-key text-xs"></i> Change Account Password
            </button>
          </div>

        </div>
      </div>

      <div *ngIf="showPasswordModal"
        class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fadein">

        <div
          class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-8 shadow-2xl border border-gray-200 dark:border-gray-700"
          (click)="$event.stopPropagation()">
          <h2 class="text-2xl font-bold mb-6 dark:text-white flex items-center gap-3">
            <i class="pi pi-lock text-[#6FCBF0]"></i> Security Update
          </h2>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-bold mb-2 text-gray-600 dark:text-gray-400">Current Password</label>
              <input type="password" [(ngModel)]="passwordData.old_password" placeholder="Enter old password"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#6FCBF0] outline-none dark:text-white transition-all" />
            </div>

            <div>
              <label class="block text-sm font-bold mb-2 text-gray-600 dark:text-gray-400">New Password</label>
              <input type="password" [(ngModel)]="passwordData.new_password" placeholder="Enter new password"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#6FCBF0] outline-none dark:text-white transition-all" />
            </div>

            <div>
              <label class="block text-sm font-bold mb-2 text-gray-600 dark:text-gray-400">Confirm New Password</label>
              <input type="password" [(ngModel)]="passwordData.new_password_confirmation"
                placeholder="Confirm new password"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#6FCBF0] outline-none dark:text-white transition-all" />
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-8">
            <button (click)="showPasswordModal = false"
              class="px-6 py-2.5 text-gray-600 dark:text-gray-400 font-bold hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-colors">
              Cancel
            </button>
            <button (click)="submitPasswordChange()" [disabled]="isChangingPassword"
              class="px-6 py-2.5 bg-[#6FCBF0] text-gray-900 font-bold rounded-xl hover:bg-[#5dbfe4] transition-all shadow-md active:scale-95 disabled:opacity-70 flex items-center gap-2">
              <i *ngIf="isChangingPassword" class="pi pi-spin pi-spinner"></i>
              {{ isChangingPassword ? 'Updating...' : 'Confirm Change' }}
            </button>
          </div>
        </div>
      </div>

      <div
        class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-200/50 dark:border-gray-700">
        <div class="space-y-6">

          <div class="flex items-center gap-4">
            <i class="pi pi-building text-xl text-gray-600 dark:text-gray-400"></i>
            <div>
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Department</p>
              <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.departmentName }}</p>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <i class="pi pi-shield text-xl text-gray-600 dark:text-gray-400"></i>
            <div>
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Role</p>
              <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.roleName }}</p>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>
</div>

<p-toast position="top-right"></p-toast>
