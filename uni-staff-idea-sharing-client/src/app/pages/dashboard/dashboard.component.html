<div *ngIf="lastLoginMessage"
  class="mb-6 p-4 rounded-xl flex items-center gap-3 border transition-colors animate-fadein"
  [ngClass]="lastLoginMessage.includes('Welcome') 
    ? 'bg-blue-50 border-blue-200 text-blue-700 dark:bg-blue-900/20 dark:border-blue-800 dark:text-blue-300' 
    : 'bg-orange-50 border-orange-200 text-orange-700 dark:bg-orange-900/20 dark:border-orange-800 dark:text-orange-300'">

  <i class="pi" [ngClass]="lastLoginMessage.includes('Welcome') ? 'pi-user' : 'pi-shield'"></i>
  <span class="text-sm font-bold">{{ lastLoginMessage }}</span>

  <button (click)="lastLoginMessage = ''" class="ml-auto hover:opacity-70">
    <i class="pi pi-times text-xs"></i>
  </button>
</div>

<p-toast position="top-right"></p-toast>

<div class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900">
  <header
    class="flex-shrink-0 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm z-10">
    <div class="px-4 md:px-6 lg:px-8 py-4">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 max-w-[1400px] mx-auto">
        <div>
          <h1
            class="text-2xl md:text-3xl font-bold text-[#2c3e50] dark:text-white m-0 font-sans flex items-center gap-3">
            <i class="pi"
              [ngClass]="{'pi-chart-line': userRole === 'QA Manager', 'pi-globe': userRole === 'Administrator', 'pi-chart-bar': userRole === 'Staff'}">
            </i>
            {{ userRole }} Dashboard
          </h1>
          <h2 *ngIf="!isGlobalView"
            class="text-lg md:text-xl font-bold text-[#e65100] dark:text-[#f16738] mt-1 m-0 font-sans">
            {{ userDepartment }}
          </h2>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto items-center">
          <div class="relative group w-full sm:w-auto" *ngIf="authService.hasPermission('Export System Data')">
            <button
              class="w-full sm:w-auto px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors">
              <i class="pi pi-download"></i> Export Data <i class="pi pi-angle-down text-xs"></i>
            </button>

            <div
              class="absolute right-0 top-full mt-1 w-full sm:w-40 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 hidden group-hover:block z-50 overflow-hidden">
              <button (click)="exportData('csv')"
                class="w-full text-left px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 flex items-center gap-2">
                <i class="pi pi-file-excel text-green-600"></i> Export as CSV
              </button>
              <button (click)="exportData('pdf')"
                class="w-full text-left px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 flex items-center gap-2 border-t border-gray-100 dark:border-gray-700">
                <i class="pi pi-file-pdf text-red-500"></i> Export as PDF
              </button>
            </div>
          </div>

          <button *ngIf="authService.hasPermission('Download All Documents')" (click)="downloadZip()"
            class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm flex items-center gap-2 transition-colors">
            <i class="pi pi-file-pdf"></i> Download Documents ZIP
          </button>

          <div class="relative w-full sm:w-auto">
            <select (change)="onYearChange($event)"
              class="w-full appearance-none bg-white dark:bg-gray-800 border-2 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-white font-bold py-2.5 pl-4 pr-10 rounded-lg focus:outline-none focus:border-[#6FCBF0] cursor-pointer shadow-sm">

              <option *ngFor="let setting of closureSettings" [value]="setting.settingID"
                [selected]="setting.settingID === selectedSettingID">
                {{ setting.academicYear }} - {{ setting.title }}
              </option>
            </select>
            <i class="pi pi-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto">
    <div class="p-4 md:p-6 lg:p-8 max-w-[1400px] mx-auto space-y-4 md:space-y-6">

      <div [@listAnimation]="stats.length" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
        <div *ngFor="let stat of stats"
          class="bg-gradient-to-br from-[#a8e6cf] to-[#88d4ab] dark:from-[#2c5f5d] dark:to-[#1a3936] rounded-2xl p-6 shadow-sm transition-all duration-300 hover:-translate-y-1 flex flex-col items-center justify-center min-h-[120px]">
          <div class="text-base md:text-lg font-bold text-[#2c3e50] dark:text-white mb-2 text-center">{{ stat.label }}
          </div>
          <div class="text-4xl md:text-5xl font-extrabold text-[#2c5f5d] dark:text-[#a8e6cf]">{{ stat.value }}</div>
        </div>
      </div>

      <ng-container *ngIf="userRole === 'Administrator'">
        <div class="pt-2">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800 dark:text-white">
            <i class="pi pi-shield text-blue-500"></i> System Monitoring
          </h2>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
              <h3 class="text-sm font-bold mb-3 uppercase tracking-wider text-gray-500">Most Active</h3>
              <div class="flex flex-col gap-2 overflow-y-auto max-h-[250px] pr-1">
                <div *ngFor="let user of mostActiveUsers"
                  class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50">
                  <img *ngIf="user.staffProfile" [src]="getProfileUrl(user.staffProfile)"
                    class="w-8 h-8 rounded-full flex-shrink-0">
                  <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate m-0 dark:text-white">{{ user.staffName }}</p>
                  </div>
                  <span class="text-[10px] font-bold text-blue-600">{{ user.activityCount }}</span>
                </div>
              </div>
            </div>

            <div
              class="md:col-span-2 bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
              <div class="h-[250px]">
                <canvas id="pagesChart"></canvas>
              </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
              <div class="h-[250px]">
                <canvas id="browserChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </ng-container>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div
          class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
          <div class="h-[280px]">
            <canvas id="barChart"></canvas>
          </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
          <div class="h-[280px]">
            <canvas id="donutChart"></canvas>
          </div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
          <div class="h-[280px]">
            <canvas id="horizontalBarChart"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
