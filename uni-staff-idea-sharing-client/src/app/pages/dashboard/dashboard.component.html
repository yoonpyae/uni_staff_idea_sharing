<div class="h-screen flex flex-col">
  <header
    class="flex-shrink-0 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm z-10">
    <div class="px-4 md:px-6 lg:px-8 py-4">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 max-w-[1400px] mx-auto">

        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-[#2c3e50] dark:text-white m-0 font-sans">
            Statistics Dashboard
          </h1>
          <h2 *ngIf="!isGlobalView"
            class="text-lg md:text-xl font-bold text-[#e65100] dark:text-[#f16738] mt-1 m-0 font-sans">
            {{ userDepartment }}
          </h2>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto mt-2 sm:mt-0">
          <div class="relative">
            <select (change)="onYearChange($event)"
              class="appearance-none bg-[#D9D9D9] dark:bg-gray-800 border-2 border-gray-300 dark:border-gray-600 rounded-xl px-4 pr-10 py-2.5 text-[0.95rem] font-semibold text-[#2c3e50] dark:text-white cursor-pointer transition-all duration-200 hover:border-[#a8e6cf] dark:hover:border-[#88d4ab] focus:outline-none focus:border-[#a8e6cf] min-w-[100px]">
              <option *ngFor="let year of years" [value]="year">{{ year }}</option>
            </select>
            <i
              class="pi pi-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 pointer-events-none text-xs"></i>
          </div>

          <button (click)="onExport()"
            class="flex items-center justify-center gap-3 px-6 py-2.5 rounded-xl font-semibold text-[0.95rem] bg-[#E7D3B3] hover:bg-[#cbb38f] dark:bg-gray-700 dark:hover:bg-gray-600 text-[#2c3e50] dark:text-white shadow-sm hover:shadow-md transition-all duration-200 min-w-[150px]">
            <i class="pi pi-upload"></i>
            <span>Export Data</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto">
    <div class="p-4 md:p-6 lg:p-8 max-w-[1400px] w-full mx-auto">

      <div [@listAnimation]="stats.length"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-6 md:mb-8">
        <div *ngFor="let stat of stats"
          class="bg-gradient-to-br from-[#a8e6cf] to-[#88d4ab] dark:from-[#2c5f5d] dark:to-[#1a3936] rounded-2xl p-6 shadow-[0_4px_15px_rgba(0,0,0,0.08)] transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_8px_25px_rgba(0,0,0,0.12)] cursor-pointer flex flex-col items-center justify-center min-h-[120px]">
          <div class="text-base md:text-lg font-bold text-[#2c3e50] dark:text-white mb-2 text-center leading-tight">
            {{ stat.label }}
          </div>
          <div class="text-4xl md:text-5xl font-extrabold text-[#2c5f5d] dark:text-[#a8e6cf] font-sans text-center">
            {{ stat.value }}
          </div>
        </div>
      </div>

      <div class="space-y-6 pb-6">
        <div
          class="bg-white dark:bg-gray-800 rounded-2xl p-6 md:p-8 shadow-[0_4px_15px_rgba(0,0,0,0.08)] border border-gray-200 dark:border-gray-700">
          <div class="h-[350px] md:h-[400px]">
            <canvas id="barChart"></canvas>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div
            class="bg-white dark:bg-gray-800 rounded-2xl p-6 md:p-8 shadow-[0_4px_15px_rgba(0,0,0,0.08)] border border-gray-200 dark:border-gray-700">
            <div class="h-[400px] md:h-[450px]">
              <canvas id="donutChart"></canvas>
            </div>
          </div>
          <div
            class="bg-white dark:bg-gray-800 rounded-2xl p-6 md:p-8 shadow-[0_4px_15px_rgba(0,0,0,0.08)] border border-gray-200 dark:border-gray-700">
            <div class="h-[400px] md:h-[450px]">
              <canvas id="horizontalBarChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
