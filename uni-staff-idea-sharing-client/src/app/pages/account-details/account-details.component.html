<div class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
  
  <header class="flex-shrink-0 px-8 py-6 flex items-center justify-between z-10">
    <h1 class="text-[26px] font-bold text-[#2c3e50] dark:text-white m-0">Account Details</h1>
    
    <div class="relative w-full md:w-64 hidden md:block">
      <input type="text" placeholder="Search..."
        class="w-full px-4 py-2.5 pl-4 pr-10 bg-gray-200 dark:bg-gray-700 border-none rounded-md text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] transition-all" />
      <i class="pi pi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400"></i>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-6 pb-12">
    <div class="max-w-2xl mx-auto space-y-4">
      
      <div class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-center gap-8 shadow-sm border border-gray-200/50 dark:border-gray-700">
        
        <input type="file" accept="image/*" #fileInput class="hidden" (change)="onProfileSelected($event)" />
        
        <div class="w-28 h-28 rounded-full border-4 border-[#2c3e50] dark:border-gray-500 overflow-hidden flex items-center justify-center bg-white dark:bg-gray-700 flex-shrink-0">
          <img *ngIf="profilePictureUrl; else defaultUserIcon" [src]="profilePictureUrl" alt="Profile" class="w-full h-full object-cover" />
          <ng-template #defaultUserIcon>
            <i class="pi pi-user text-4xl text-gray-400 dark:text-gray-300"></i>
          </ng-template>
        </div>

        <button (click)="fileInput.click()" class="px-6 py-2.5 bg-[#6FCBF0] hover:bg-[#5dbfe4] text-gray-900 font-bold rounded-xl shadow-sm transition-colors whitespace-nowrap">
          Update Profile Picture
        </button>
      </div>

      <div class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-200/50 dark:border-gray-700 relative">
        
        <button *ngIf="!isEditing" (click)="toggleEdit()" class="absolute top-6 right-6 text-gray-600 dark:text-gray-300 hover:text-[#2c3e50] dark:hover:text-white transition-colors">
          <i class="pi pi-pencil text-xl"></i>
        </button>

        <div class="space-y-6">
          
          <div class="flex items-start gap-4">
            <i class="pi pi-user text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Full Name</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffName }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="text" [(ngModel)]="user.staffName" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div class="flex items-start gap-4">
            <i class="pi pi-phone text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Phone Number</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffPhNo }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="text" [(ngModel)]="user.staffPhNo" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div class="flex items-start gap-4">
            <i class="pi pi-envelope text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Email Address</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.staffEmail }}</p>
              </ng-container>
              <input *ngIf="isEditing" type="email" [(ngModel)]="user.staffEmail" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div class="flex items-start gap-4">
            <i class="pi pi-lock text-xl text-gray-600 dark:text-gray-400 mt-1"></i>
            <div class="flex-1">
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Password</p>
              <ng-container *ngIf="!isEditing">
                <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0 tracking-widest">••••••••</p>
              </ng-container>
              <input *ngIf="isEditing" type="password" [(ngModel)]="user.password" placeholder="Leave blank to keep current password" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] text-gray-800 dark:text-white" />
            </div>
          </div>

          <div *ngIf="isEditing" class="flex justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700 mt-4">
            <button (click)="toggleEdit()" class="px-5 py-2 text-gray-600 dark:text-gray-300 font-semibold hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">
              Cancel
            </button>
            <button (click)="saveChanges()" class="px-5 py-2 bg-[#6FCBF0] hover:bg-[#5dbfe4] text-gray-900 font-bold rounded-lg shadow-sm transition-colors">
              Save Profile
            </button>
          </div>

        </div>
      </div>

      <div class="bg-gray-100 dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-200/50 dark:border-gray-700">
        <div class="space-y-6">
          
          <div class="flex items-center gap-4">
            <i class="pi pi-building text-xl text-gray-600 dark:text-gray-400"></i>
            <div>
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Department</p>
              <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.departmentName }}</p>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <i class="pi pi-shield text-xl text-gray-600 dark:text-gray-400"></i>
            <div>
              <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold mb-1">Role</p>
              <p class="text-base font-bold text-[#2c3e50] dark:text-white m-0">{{ user.roleName }}</p>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>
</div>

<p-toast position="top-right"></p-toast>
