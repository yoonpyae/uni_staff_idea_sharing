<div class="min-h-screen bg-white text-gray-800 font-sans p-8 max-w-6xl mx-auto">

    <header class="flex items-center justify-between mb-10">
        <button (click)="goBack()"
            class="flex items-center gap-2 px-5 py-2.5 bg-gray-200 rounded-full font-bold text-gray-800 hover:bg-gray-300 transition-colors shadow-sm">
            <i class="pi pi-angle-left"></i> Back to Ideas
        </button>

        <!-- <div class="relative">
            <input type="text" placeholder="Search..."
                class="w-64 px-4 py-2.5 pl-4 pr-10 bg-gray-200 border-none rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-300 text-gray-800" />
            <i class="pi pi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
        </div> -->
    </header>

    <div class="flex flex-col gap-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-full border-2 border-gray-800 flex items-center justify-center bg-gray-100 flex-shrink-0 overflow-hidden">

                    <img *ngIf="profilePictureUrl; else defaultIcon" [src]="profilePictureUrl" alt="Profile"
                        class="w-full h-full object-cover" />

                    <ng-template #defaultIcon>
                        <div
                            class="w-full h-full bg-[#2c5f5d] dark:bg-[#a8e6cf] flex items-center justify-center text-white dark:text-[#2c3e50]">
                            <i class="pi pi-user text-2xl"></i>
                        </div>
                    </ng-template>

                </div>

                <div class="flex flex-col">
                    <span class="font-bold text-gray-900 dark:text-white text-lg">{{ name }}</span>
                    <span class="text-sm text-gray-500 dark:text-gray-400 font-medium">
                        {{ currentDate | date:'mediumDate' }} &nbsp; {{ currentDate | date:'shortTime' }}
                    </span>
                </div>
            </div>

            <div class="relative inline-block">
                <select [(ngModel)]="selectedCategoryId"
                    class="appearance-none bg-[#a8e6cf] hover:bg-[#88d4ab] text-gray-900 font-bold px-6 py-3 pr-10 rounded-xl cursor-pointer focus:outline-none focus:ring-2 focus:ring-[#88d4ab] transition-colors shadow-sm w-48 text-center">
                    <option [ngValue]="null" disabled selected>Choose Category</option>
                    <option *ngFor="let cat of categories" [value]="cat.categoryID">{{ cat.categoryname }}</option>
                </select>
                <i
                    class="pi pi-angle-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-800 font-bold pointer-events-none"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">

            <div class="lg:col-span-2 flex flex-col gap-4">
                <input type="text" [(ngModel)]="title" placeholder="Enter your idea title..."
                    class="w-full border border-gray-400 rounded-xl px-5 py-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] shadow-sm font-medium" />

                <textarea [(ngModel)]="description" placeholder="What's on your mind?" rows="12"
                    class="w-full border border-gray-400 rounded-xl px-5 py-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#6FCBF0] shadow-sm resize-none font-medium"></textarea>
            </div>

            <div class="lg:col-span-1 h-full">
                <input type="file" id="fileUpload" multiple (change)="onFileSelect($event)" class="hidden" />

                <label for="fileUpload"
                    class="h-full min-h-[300px] border-[1.5px] border-gray-400 rounded-xl flex flex-col items-center justify-center p-8 text-center cursor-pointer hover:bg-gray-50 transition-colors shadow-sm">
                    <i class="pi pi-file-plus text-4xl text-gray-600 mb-4"></i>
                    <span class="text-gray-600 font-medium mb-1">Drop files here or click to select</span>
                    <span class="text-sm text-gray-400 font-medium">Supports images and documents</span>

                    <div *ngIf="selectedFiles.length > 0"
                        class="mt-6 w-full text-left bg-white border border-gray-200 rounded-lg p-3 shadow-inner">
                        <h4 class="text-sm font-bold text-gray-700 mb-2">Selected Files:</h4>
                        <ul class="text-sm space-y-1">
                            <li *ngFor="let file of selectedFiles; let i = index"
                                class="flex justify-between items-center text-gray-600">
                                <span class="truncate pr-2">{{ file.name }}</span>
                                <i class="pi pi-times text-red-500 cursor-pointer hover:text-red-700"
                                    (click)="removeFile(i); $event.preventDefault()"></i>
                            </li>
                        </ul>
                    </div>
                </label>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-between mt-4">

            <div class="flex items-center gap-3">
                <input type="checkbox" id="terms" [(ngModel)]="agreedToTerms"
                    class="w-5 h-5 rounded border-gray-400 text-[#6FCBF0] focus:ring-[#6FCBF0] cursor-pointer" />
                <label for="terms" class="font-bold text-gray-800 cursor-pointer text-sm md:text-base">I agree to terms
                    and conditions</label>
            </div>

            <div class="flex items-center gap-3 mt-6 sm:mt-0">
                <button (click)="submit(false)"
                    class="px-8 py-3 bg-[#6FCBF0] hover:bg-[#5bb8db] text-gray-900 font-bold rounded-xl shadow-sm transition-colors">
                    Submit
                </button>
                <button (click)="submit(true)"
                    class="px-6 py-3 bg-[#6FCBF0] hover:bg-[#5bb8db] text-gray-900 font-bold rounded-xl shadow-sm transition-colors">
                    Submit Anonymously
                </button>
                <button (click)="clearForm()"
                    class="px-8 py-3 bg-[#ff9b9b] hover:bg-[#ff8282] text-gray-900 font-bold rounded-xl shadow-sm transition-colors">
                    Clear
                </button>
            </div>
        </div>

    </div>
</div>

<p-toast position="top-right"></p-toast>
