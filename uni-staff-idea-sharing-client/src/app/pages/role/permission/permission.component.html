<div class="h-screen flex flex-col ">
    <header class="flex-shrink-0 border-b border-gray-200">
        <div class="px-6 py-4 flex flex-row items-center justify-between">
            <button type="button" (click)="goBack()"
                class="flex items-center gap-2 px-5 py-2 bg-gray-200 dark:bg-[#2c3e50] rounded-full font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                <i class="pi pi-angle-left"></i>
                <span class="text-base font-semibold ">Go Back</span>
            </button>

            <div class="relative flex-1 max-w-[400px]">
                <input type="text" [value]="searchQuery" (input)="onSearch($event)" placeholder="Search..."
                    class="w-full px-4 pl-10 py-3 border-2 border-gray-200 rounded-xl text-[0.95rem] bg-gray-100 placeholder:text-gray-400 transition-all focus:outline-none focus:border-[#a8e6cf]" />
                <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[0.95rem]"></i>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto px-10 py-10 max-w-6xl mx-auto w-full">
        <h1 class="text-[26px] font-bold mb-12">
            Set Permissions for <strong class="text-[#f16738]">{{ roleName }}</strong> Role
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-10 border-t border-gray-200 pt-8">

            <div *ngFor="let group of groupedPermissions" class="flex flex-col mb-8">
                <h3 class="font-bold text-lg  mb-5">{{ group.category }}</h3>

                <div class="space-y-4 ml-2">
                    <label *ngFor="let perm of group.permissions" class="flex items-center gap-4 cursor-pointer group">

                        <input type="checkbox" [checked]="hasPermission(perm.permissionID)"
                            (change)="togglePermission(perm.permissionID, $event)"
                            class="w-5 h-5 rounded border-2 border-gray-400  focus:ring-black accent-black cursor-pointer transition-all">

                        <span class="text-[15px] font-medium  group-hover:text-black transition-colors">
                            {{ perm.permission }}
                        </span>
                    </label>
                </div>
            </div>

        </div>

        <div class="flex justify-end mt-16 pt-6 border-t border-gray-100">
            <button (click)="saveChanges()"
                class="px-8 py-3 bg-[#7cd2ef] text-gray-900 font-bold rounded-xl shadow-sm hover:bg-[#62bddd] transition-colors focus:ring-4 focus:ring-[#7cd2ef]/50">
                Save Changes
            </button>
        </div>
    </div>
</div>

<p-toast position="top-right"></p-toast>
