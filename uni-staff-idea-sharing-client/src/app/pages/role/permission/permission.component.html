<div class="flex flex-col w-full relative h-full">

    <header
        class="sticky top-0 z-20 flex-shrink-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-700">
        <div class="px-4 md:px-6 py-3 md:py-4 flex items-center justify-between gap-3 md:gap-4 max-w-[1400px] mx-auto">

            <button type="button" (click)="goBack()"
                class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:h-auto sm:px-5 sm:py-2.5 bg-gray-200 dark:bg-gray-800 rounded-full font-semibold hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors text-gray-800 dark:text-gray-200 flex-shrink-0 shadow-sm">
                <i class="pi pi-angle-left text-lg sm:text-base"></i>
                <span class="hidden sm:inline text-sm md:text-base font-semibold">Go Back</span>
            </button>

            <!-- <div class="relative flex-1 max-w-[400px]">
                <input type="text" [value]="searchQuery" (input)="onSearch($event)" placeholder="Search..."
                    class="w-full px-4 pl-10 py-2.5 md:py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl text-[0.95rem] bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-all focus:outline-none focus:border-[#a8e6cf] dark:focus:border-[#2c5f5d]" />
                <i
                    class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-[0.95rem]"></i>
            </div> -->
        </div>
    </header>

    <div class="px-4 py-6 md:px-8 md:py-10 max-w-6xl mx-auto w-full">

        <h1 class="text-2xl md:text-[26px] font-bold mb-8 md:mb-12 text-gray-900 dark:text-white">
            Set Permissions for <strong class="text-[#f16738] dark:text-[#ff8a65]">{{ roleName }}</strong> Role
        </h1>

        <div
            class="grid grid-cols-1 md:grid-cols-2 gap-x-8 md:gap-x-16 gap-y-8 md:gap-y-10 border-t border-gray-200 dark:border-gray-700 pt-8">

            <div *ngFor="let group of groupedPermissions" class="flex flex-col mb-2 md:mb-8">
                <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-4 md:mb-5">
                    {{ group.category }}
                </h3>

                <div class="space-y-3 md:space-y-4 ml-1 md:ml-2">
                    <label *ngFor="let perm of group.permissions"
                        class="flex items-start md:items-center gap-3 md:gap-4 cursor-pointer group">

                        <input type="checkbox" [checked]="hasPermission(perm.permissionID)"
                            (change)="togglePermission(perm.permissionID, $event)"
                            class="mt-0.5 md:mt-0 w-5 h-5 rounded border-2 border-gray-400 dark:border-gray-500 focus:ring-black dark:focus:ring-white accent-black dark:accent-white cursor-pointer transition-all flex-shrink-0">

                        <span
                            class="text-[14.5px] md:text-[15px] font-medium text-gray-700 dark:text-gray-300 group-hover:text-black dark:group-hover:text-white transition-colors leading-snug">
                            {{ perm.permission }}
                        </span>
                    </label>
                </div>
            </div>

        </div>

        <div class="flex justify-end mt-12 md:mt-16 pt-6 border-t border-gray-200 dark:border-gray-700">
            <button (click)="saveChanges()"
                class="w-full sm:w-auto px-8 py-3.5 md:py-3 bg-[#6FCBF0] hover:bg-[#5bb8db] dark:bg-[#2c555f] dark:hover:bg-[#234a48] text-gray-900 dark:text-white font-bold rounded-xl shadow-sm transition-colors focus:ring-4 focus:ring-[#6FCBF0]/50 dark:focus:ring-[#2c5f5d]/50">
                Save Changes
            </button>
        </div>
    </div>
</div>

<p-toast position="top-right"></p-toast>
