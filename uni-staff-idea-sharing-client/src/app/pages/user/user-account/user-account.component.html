<div class="flex flex-col w-full relative h-full">

  <header
    class="sticky top-0 z-20 flex-shrink-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm transition-all duration-300">
    <div class="px-4 md:px-6 lg:px-8 py-3 md:py-4">
      <div class="flex flex-col gap-4 max-w-[1400px] mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
          <div>
            <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-[#2c3e50] dark:text-white m-0 font-sans truncate">
              Staff Assignment
            </h1>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="p-4 md:p-6 lg:p-8 max-w-[1400px] w-full mx-auto">

    <div
      class="bg-white dark:bg-gray-800 rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.08)] dark:shadow-[0_4px_15px_rgba(0,0,0,0.3)] border border-gray-200 dark:border-gray-700 overflow-hidden">

      <p-table #dt [value]="users" [paginator]="true" [rows]="rows" [rowsPerPageOptions]="rowsPerPageOptions"
        [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
        [globalFilterFields]="['staffName', 'account_status', 'roleName', 'departmentName', 'staffPhNo','role.roleName', 'department.departmentName']"
        [tableStyle]="{ 'min-width': '50rem' }" styleClass="custom-table">

        <ng-template pTemplate="caption">
          <div class="flex flex-col md:flex-row justify-end items-stretch md:items-center gap-3 md:gap-4 py-2 w-full">

            <div class="flex flex-row items-center gap-3 w-full md:w-auto">
              <div class="flex-1 md:flex-none">
                <p-columnFilter field="role.roleName" matchMode="equals" [showMenu]="false">
                  <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                    <p-dropdown [options]="roleFilterOptions" [ngModel]="value" placeholder="All Roles"
                      (onChange)="filter($event.value)" [showClear]="true"
                      styleClass="filter-dropdown w-full md:w-auto">
                    </p-dropdown>
                  </ng-template>
                </p-columnFilter>
              </div>

              <div class="flex-1 md:flex-none">
                <p-columnFilter field="department.departmentName" matchMode="equals" [showMenu]="false">
                  <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                    <p-dropdown [options]="departmentFilterOptions" [ngModel]="value" placeholder="All Depts"
                      (onChange)="filter($event.value)" [showClear]="true"
                      styleClass="filter-dropdown w-full md:w-auto">
                    </p-dropdown>
                  </ng-template>
                </p-columnFilter>
              </div>
            </div>

            <div class="relative w-full md:w-auto md:min-w-[300px]">
              <input type="text" (input)="onGlobalFilter($event)" placeholder="Search users..."
                class="w-full px-4 pl-10 py-2.5 border-2 border-gray-300 dark:border-gray-600 rounded-xl text-[0.95rem] bg-gray-50 dark:bg-gray-700 text-[#2c3e50] dark:text-white transition-all focus:outline-none focus:border-[#a8e6cf] dark:focus:border-[#88d4ab]" />
              <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400"></i>
            </div>

          </div>
        </ng-template>

        <ng-template pTemplate="header">
          <tr class="bg-gray-50 dark:bg-gray-700/50">
            <th
              class="px-4 md:px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              No.</th>
            <th
              class="px-4 md:px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              Name</th>
            <th
              class="px-4 md:px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              Role</th>
            <th
              class="px-4 md:px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              Department</th>
            <th
              class="px-4 md:px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              Status
            </th>
            <th
              class="px-4 md:px-6 py-4 text-center text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
              Action</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-user let-rowIndex="rowIndex">
          <tr (click)="openAssignment(user)"
            class="cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors duration-150 border-b border-gray-200 dark:border-gray-700 last:border-b-0">

            <td class="px-4 md:px-6 py-4 text-sm text-gray-700 dark:text-gray-300">
              {{ rowIndex + 1 }}.
            </td>

            <td class="px-4 md:px-6 py-4">
              <div class="flex items-center gap-3">
                <div
                  class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-gray-300 dark:bg-gray-600 flex items-center justify-center flex-shrink-0 overflow-hidden">
                  <img *ngIf="user.staffProfile; else defaultUserIcon" [src]="getProfileUrl(user.staffProfile)"
                    alt="Profile Photo" class="w-full h-full object-cover" />
                  <ng-template #defaultUserIcon>
                    <i class="pi pi-user text-gray-600 dark:text-gray-300"></i>
                  </ng-template>
                </div>
                <span class="text-sm font-medium text-gray-900 dark:text-white truncate max-w-[150px] md:max-w-xs">
                  {{ user.staffName }}
                </span>
              </div>
            </td>

            <td class="px-4 md:px-6 py-4">
              <span [class]="getRoleColor(user.roleName)"
                class="text-[13px] md:text-sm font-semibold whitespace-nowrap">
                {{ user.role.roleName }}
              </span>
            </td>

            <td class="px-4 md:px-6 py-4">
              <span [class]="getDepartmentColor(user.departmentName)"
                class="text-[13px] md:text-sm font-semibold whitespace-nowrap">
                {{ user.department.departmentName }}
              </span>
            </td>

            <td class="px-4 md:px-6 py-4">
              <span [ngClass]="{
    'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': user.account_status === 'active',
    'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400': user.account_status === 'inactive' || user.account_status === 'deactivated',
    'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400': user.account_status === 'suspended'
  }" class="px-3 py-1 rounded-full text-xs font-bold">
                {{ user.account_status || 'N/A' }}
              </span>
            </td>

            <td class="px-4 md:px-6 py-4">
              <div class="flex items-center justify-center gap-2 flex-nowrap">
                <button (click)="$event.stopPropagation(); editUser(user)"
                  class="w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-500 hover:text-white transition-all duration-200"
                  title="Edit User">
                  <i class="pi pi-pencil text-sm"></i>
                </button>
                <button (click)="$event.stopPropagation(); deleteUser(user)"
                  class="w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-red-500 hover:text-white transition-all duration-200"
                  title="Delete User">
                  <i class="pi pi-trash text-sm"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="text-center py-12 md:py-16">
              <div class="flex flex-col items-center">
                <i class="pi pi-users text-5xl md:text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
                <h3 class="text-lg md:text-xl font-semibold text-gray-500 dark:text-gray-400 mb-2">
                  No users found
                </h3>
                <p class="text-sm md:text-base text-gray-400 dark:text-gray-500">
                  Try adjusting your search or filters
                </p>
              </div>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="paginatorleft">
          <span class="text-[13px] md:text-sm font-medium text-gray-600 dark:text-gray-400 pl-2">
            Total: {{ users.length }} users
          </span>
        </ng-template>

      </p-table>
    </div>
  </div>

  <button (click)="createUser()"
    class="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-14 h-14 flex items-center justify-center bg-[#a8e6cf] dark:bg-[#2c5f5d] text-[#2c3e50] dark:text-white rounded-full shadow-[0_8px_25px_rgba(0,0,0,0.2)] hover:shadow-[0_12px_35px_rgba(0,0,0,0.3)] hover:-translate-y-1 transition-all duration-200 z-30"
    title="Add New User">
    <i class="pi pi-plus text-2xl"></i>
  </button>
</div>

<p-confirmDialog styleClass="custom-confirm-dialog"></p-confirmDialog>

<p-toast position="top-right"></p-toast>
