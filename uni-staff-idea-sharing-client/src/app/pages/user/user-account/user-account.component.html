<div class="h-screen flex flex-col">
  <!-- Fixed Header -->
  <header
    class="flex-shrink-0 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm z-10">
    <div class="px-4 md:px-6 lg:px-8 py-4">
      <div class="flex flex-col gap-4 max-w-[1400px] mx-auto">
        <!-- Title and Search Row -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <div>
            <h1 class="text-2xl md:text-3xl font-bold text-[#2c3e50] dark:text-white m-0 font-sans">
              Staff Assignment
            </h1>
          </div>

          <div class="relative flex-1 sm:flex-initial">
            <input type="text" (input)="onGlobalFilter($event)" placeholder="Search..."
              class="w-full sm:min-w-[300px] px-4 pl-10 py-2.5 border-2 border-gray-300 dark:border-gray-600 rounded-xl text-[0.95rem] bg-white dark:bg-gray-700 text-[#2c3e50] dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-all duration-200 focus:outline-none focus:border-[#a8e6cf] dark:focus:border-[#88d4ab] focus:shadow-[0_0_0_3px_rgba(168,230,207,0.1)] dark:focus:shadow-[0_0_0_3px_rgba(136,212,171,0.2)]" />
            <i
              class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 text-[0.95rem]"></i>
          </div>
        </div>


      </div>
    </div>
  </header>

  <!-- Scrollable Content -->
  <div class="flex-1 overflow-y-auto">

    <div class="p-4 md:px-6 lg:px-8 max-w-[1400px] w-full mx-auto">
      <!-- Table Container -->
      <div
        class="bg-white dark:bg-gray-800 rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.08)] dark:shadow-[0_4px_15px_rgba(0,0,0,0.3)] border border-gray-200 dark:border-gray-700 overflow-hidden">
        <p-table #dt [value]="users" [paginator]="true" [rows]="rows" [rowsPerPageOptions]="rowsPerPageOptions"
          [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
          [globalFilterFields]="['staffName', 'staffEmail', 'roleName', 'departmentName', 'staffPhNo']"
          [tableStyle]="{ 'min-width': '50rem' }" styleClass="custom-table">

          <ng-template pTemplate="header">
            <tr class="bg-gray-50 dark:bg-gray-700/50">
              <th
                class="px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                No.
              </th>
              <th
                class="px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                Name
              </th>
              <th
                class="px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                Role
              </th>
              <th
                class="px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                Department
              </th>
              <th
                class="px-6 py-4 text-left text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                Email
              </th>
              <th
                class="px-6 py-4 text-center text-sm font-bold text-gray-700 dark:text-gray-200 border-b border-gray-200 dark:border-gray-600">
                Action
              </th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-user let-rowIndex="rowIndex">
            <tr
              class="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors duration-150 border-b border-gray-200 dark:border-gray-700 last:border-b-0">
              <td class="px-6 py-4 text-sm text-gray-700 dark:text-gray-300">
                {{ rowIndex + 1 }}.
              </td>
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div
                    class="w-10 h-10 rounded-full bg-gray-300 dark:bg-gray-600 flex items-center justify-center flex-shrink-0">
                    <i class="pi pi-user text-gray-600 dark:text-gray-300"></i>
                  </div>
                  <span class="text-sm font-medium text-gray-900 dark:text-white">
                    {{ user.staffName }}
                  </span>
                </div>
              </td>
              <td class="px-6 py-4">
                <span [class]="getRoleColor(user.roleName)" class="text-sm font-semibold">
                  {{ user.role.roleName }}
                </span>
              </td>
              <td class="px-6 py-4">
                <span [class]="getDepartmentColor(user.departmentName)" class="text-sm font-semibold">
                  {{ user.department.departmentName }}
                </span>
              </td>
              <td class="px-6 py-4">
                <span class="text-sm font-medium text-gray-900 dark:text-white">
                  {{ user.staffEmail }}
                </span>
              </td>
              <td class="px-6 py-4">
                <div class="flex items-center justify-center gap-2">
                  <button (click)="editUser(user)"
                    class="w-9 h-9 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-600 text-gray-600 dark:text-gray-300 hover:bg-blue-500 hover:text-white transition-all duration-200"
                    title="Edit User">
                    <i class="pi pi-pencil text-sm"></i>
                  </button>
                  <button (click)="deleteUser(user)"
                    class="w-9 h-9 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-600 text-gray-600 dark:text-gray-300 hover:bg-red-500 hover:text-white transition-all duration-200"
                    title="Delete User">
                    <i class="pi pi-trash text-sm"></i>
                  </button>
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="6" class="text-center py-12">
                <div class="flex flex-col items-center">
                  <i class="pi pi-users text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
                  <h3 class="text-xl font-semibold text-gray-500 dark:text-gray-400 mb-2">
                    No users found
                  </h3>
                  <p class="text-gray-400 dark:text-gray-500">
                    Try adjusting your search or filters
                  </p>
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="paginatorleft">
            <span class="text-sm text-gray-600 dark:text-gray-400">
              Total: {{ users.length }} users
            </span>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>

  <!-- Floating Add Button -->
  <button (click)="createUser()"
    class="fixed bottom-8 right-8 w-14 h-14 flex items-center justify-center bg-[#a8e6cf] dark:bg-[#2c5f5d] text-[#2c3e50] dark:text-white rounded-full shadow-[0_8px_25px_rgba(0,0,0,0.15)] hover:shadow-[0_12px_35px_rgba(0,0,0,0.2)] hover:-translate-y-1 transition-all duration-200 z-20"
    title="Add New User">
    <i class="pi pi-plus text-2xl"></i>
  </button>
</div>

<!-- Confirm Dialog -->
<p-confirmDialog styleClass="custom-confirm-dialog"></p-confirmDialog>

<!-- Toast -->
<p-toast position="top-right"></p-toast>
