<div class="h-screen flex flex-col font-sans text-gray-800 dark:text-gray-200 overflow-hidden">

  <header class="flex-shrink-0 flex items-center justify-between px-8 py-6 border-b border-gray-100">
    <div class="flex items-center gap-4">
      <div *ngIf="isCreateMode" class="flex items-center gap-3">
        <button (click)="goBack()"
          class="flex items-center justify-center w-9 h-9 border-[2.5px] border-[#2c3e50] dark:border-gray-200 rounded-full hover:bg-gray-100 transition-colors">
          <i class="pi pi-angle-left text-lg text-[#2c3e50] dark:text-gray-100 font-bold pr-[2px]"></i>
        </button>
        <h1 class="text-[26px] font-bold text-[#2c3e50] dark:text-gray-100">Staff Registration</h1>
      </div>

      <button *ngIf="!isCreateMode" (click)="goBack()"
        class="flex items-center gap-2 px-5 py-2 bg-gray-200 dark:bg-[#2c3e50] rounded-full font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
        <i class="pi pi-angle-left"></i> Go Back
      </button>
    </div>

    <div class="flex items-center gap-4">
      <button *ngIf="!isCreateMode" (click)="resetPassword()"
        class="flex items-center gap-2 px-6 py-2 bg-[#ff9b9b] dark:bg-[#ff6b6b] text-gray-900 font-semibold rounded-full shadow-sm hover:bg-[#ff8282] transition-colors">
        <i class="pi pi-key"></i> Reset Password
      </button>

      <div class="relative">
        <input type="text" placeholder="Search..."
          class="w-64 px-4 py-2 pl-4 pr-10 bg-gray-200 border-none rounded-md focus:outline-none focus:ring-2 focus:ring-gray-300" />
        <i class="pi pi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto w-full">
    <div class="max-w-5xl mx-auto p-8 pb-20">

      <!-- global hidden file input used by both create and edit sections -->
      <input type="file" accept="image/*" #fileInput class="hidden" (change)="onProfileSelected($event)" />

      <div *ngIf="isCreateMode" class="mt-4">
        <div class="grid grid-cols-2 gap-x-12 gap-y-8">

          <div class="col-span-1">
            <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Profile:</label>
            <div class="flex items-center gap-4">
              <button (click)="fileInput.click()"
                class="px-6 py-2 border border-gray-300 rounded-lg font-medium shadow-sm hover:bg-gray-200 dark:text-gray-400">Choose
                File</button>
              <span class="text-gray-600 dark:text-gray-300 font-medium">{{profileFileName}}</span>
            </div>
          </div>
          <div class="col-span-1"></div>
          <div class="space-y-6">
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Name:</label>
              <input type="text" [(ngModel)]="user.name" placeholder="Enter staff's name..."
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Phone Number:</label>
              <input type="text" [(ngModel)]="user.phone" placeholder="Enter staff's phone number..."
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Email:</label>
              <input type="email" [(ngModel)]="user.email" placeholder="Enter staff's email..."
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Role:</label>
              <p-select [options]="availableRoles" [(ngModel)]="user.role" (onChange)="selectRole($event.value)"
                optionLabel="roleName" dataKey="roleID" placeholder="Select Role" [filter]="true" [showClear]="true"
                [ngModelOptions]="{ standalone: true }"
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef] appearance-none">
              </p-select>
            </div>
          </div>

          <div class="space-y-6">
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Date of Birth:</label>
              <div class="relative">
                <p-date-picker [(ngModel)]="user.staffDOB" [showIcon]="true" [dateFormat]="'yy-mm-dd'"
                  [showTime]="false" [style]="{ width: '100%' }"
                  class="w-full rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]">
                </p-date-picker>
              </div>
            </div>


            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Address:</label>
              <input type="text" [(ngModel)]="user.address" placeholder="Enter staff's address..."
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Status:</label>
              <p-select [options]="availableStatuses" [(ngModel)]="user.status" placeholder="Choose the status..."
                [showClear]="true" [filter]="true" [ngModelOptions]="{ standalone: true }" optionLabel=""
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef] appearance-none">
                <ng-template let-option pTemplate="item">
                  {{ option }}
                </ng-template>
              </p-select>
            </div>
            <div>
              <label class="block text-base font-bold mb-2 text-gray-800 dark:text-gray-100">Department:</label>
              <p-select [options]="availableDepartments" [(ngModel)]="user.department"
                (onChange)="selectDepartment($event.value)" optionLabel="departmentName" dataKey="departmentID"
                placeholder="Select Department" [filter]="true" [showClear]="true"
                [ngModelOptions]="{ standalone: true }"
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#7cd2ef] appearance-none">
              </p-select>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-4 mt-12">
          <button (click)="createStaff()"
            class="px-10 py-3 bg-[#7cd2ef] dark:bg-[#5aa8c7] text-gray-900 dark:text-white font-bold rounded-xl shadow-sm hover:bg-[#62bddd] transition-colors">Register</button>
          <button (click)="clearForm()"
            class="px-10 py-3 bg-[#ff9b9b] dark:bg-[#ff6b6b] text-gray-900 dark:text-white font-bold rounded-xl shadow-sm hover:bg-[#ff8282] transition-colors">Clear</button>
        </div>
      </div>


      <div *ngIf="!isCreateMode" class="mt-4">
        <div class="flex flex-col md:flex-row gap-12">

          <div class="flex flex-col items-center gap-6 w-[250px] flex-shrink-0">
            <div
              class="w-36 h-36 rounded-full border-[5px] border-[#2c3e50] overflow-hidden flex items-center justify-center bg-transparent relative">

              <img *ngIf="user.staffProfile; else defaultUserIcon" [src]="getProfileUrl(user.staffProfile)"
                alt="Profile Photo" class="w-full h-full object-cover" />

              <ng-template #defaultUserIcon>
                <i class="pi pi-user text-gray-600 dark:text-gray-300"></i>
              </ng-template>

              <button (click)="fileInput.click()"
                class="absolute bottom-0 right-0 bg-white rounded-full p-1 shadow hover:bg-gray-100">
                <i class="pi pi-pencil text-sm"></i>
              </button>
            </div>

            <button (click)="deactivateAccount()"
              class="w-full py-3 bg-[#ff9b9b] dark:bg-[#ff6b6b] font-bold text-gray-900 rounded-full shadow-sm hover:bg-[#ff8282] transition-colors">
              Deactivate Account
            </button>
          </div>

          <div class="flex-1 space-y-4">
            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Name:</label>
              <input type="text" [(ngModel)]="user.staffName"
                class="flex-1 px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Ph No:</label>
              <input type="text" [(ngModel)]="user.staffPhNo"
                class="flex-1 px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Email:</label>
              <input type="email" [(ngModel)]="user.staffEmail"
                class="flex-1 px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Password:</label>
              <div class="flex-1 relative">
                <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="user.password"
                  class="w-full px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
                <button (click)="togglePasswordVisibility()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-900">
                  <i class="pi" [ngClass]="showPassword ? 'pi-eye' : 'pi-eye-slash'"></i>
                </button>
              </div>
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">DOB:</label>
              <div class="flex-1 relative">
                <input type="text" [(ngModel)]="user.staffDOB"
                  class="w-full px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
                <i class="pi pi-calendar absolute right-3 top-1/2 -translate-y-1/2 text-gray-600"></i>
              </div>
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Address:</label>
              <input type="text" [(ngModel)]="user.staffAddress"
                class="flex-1 px-4 py-2 border border-[#2c3e50] rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef]" />
            </div>

            <div class="flex items-center">
              <label class="w-32 font-bold text-base">Department:</label>
              <p-select [options]="availableDepartments" [(ngModel)]="user.department"
                (onChange)="selectDepartment($event.value)" optionLabel="departmentName" dataKey="departmentID"
                placeholder="Select Department" [filter]="true" [showClear]="true"
                [ngModelOptions]="{ standalone: true }"
                styleClass="flex-1 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef] appearance-none"
                class="flex-1" > </p-select>
            </div>
          </div>
        </div>

        <div
          class="mt-12 pt-8 border-t border-gray-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gray-200  rounded-full flex items-center justify-center relative">
              <i class="pi pi-cog text-gray-500 text-2xl"></i>
              <div class="absolute inset-0 flex items-center justify-center">
                <i class="pi pi-shield text-[#ff9b9b] text-sm mt-1"></i>
              </div>
            </div>
            <div>
              <h3 class="font-bold text-lg m-0">User Role:</h3>
              <p class="text-sm text-gray-500 m-0">Assign a role to this user</p>
            </div>
          </div>

          <p-select [options]="availableRoles" [(ngModel)]="user.role" (onChange)="selectRole($event.value)"
            optionLabel="roleName" dataKey="roleID" placeholder="Select Role" [filter]="true" [showClear]="true"
            [ngModelOptions]="{ standalone: true }"
            styleClass="flex-1 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-[#7cd2ef] appearance-none"
            class="flex-1"> </p-select>
        </div>

        <div class="flex justify-end mt-12 pt-6 border-t border-gray-100">
          <button (click)="saveChanges()"
            class="px-8 py-3 bg-[#7cd2ef] dark:bg-[#5aa8c9] text-gray-900 dark:text-white font-bold rounded-xl shadow-sm hover:bg-[#62bddd] transition-colors">
            Save Changes
          </button>
        </div>
      </div>

    </div>
  </main>
</div>

<p-toast position="top-right"></p-toast>
