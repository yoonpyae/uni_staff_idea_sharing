<div class="min-h-screen flex items-center justify-center bg-gray-200 dark:bg-gray-900 p-6">
  <div class="flex w-full max-w-6xl rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.25)]">
    <!-- Left Side - Image -->
    <div class="hidden lg:block lg:w-1/2 bg-white">
      <img
        src="https://th.bing.com/th/id/R.4ec1b347a5557d820f6b2fedf6c8973a?rik=BvOIB56hCbuY8Q&riu=http%3a%2f%2fprezibase.com%2fwp-content%2fuploads%2f2015%2f04%2fThink-Big-Ideas-Prezi-Template.jpg&ehk=YGiACMzKzEAK9mkykM%2fLRQBo8uyjUF9ubqSphy1Q%2bJw%3d&risl=&pid=ImgRaw&r=0"
        alt="Think Big Ideas" class="w-full h-full object-cover" />
    </div>

    <!-- Right Side - Login Form -->
    <div class="flex-1 bg-[#95E2D3] dark:from-[#1a3936] dark:to-[#122825] flex items-center justify-center md:p-6">
      <div [@slideIn] class=" rounded-3xl p-8 md:p-12 w-full max-w-[440px] ">
        <h2 class=" text-3xl md:text-4xl font-bold text-[#2c3e50] dark:text-white m-0 mb-2 text-center font-sans">
          Welcome
        </h2>
        <p class="text-base text-[#2c3e50] dark:text-gray-300 m-0 mb-10 text-center font-medium">
          Sign in with Email!
        </p>

        <form (ngSubmit)="onSubmit()" class="w-full">
          <!-- Email Field -->
          <div class="mb-7">
            <label for="email" class="block text-[0.95rem] font-semibold text-[#2c3e50] dark:text-white mb-2">
              Email
            </label>
            <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Enter your email..." required
              class="w-full px-4 py-3.5 text-base border-2 border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-[#2c3e50] dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-all duration-300 focus:outline-none focus:border-[#a8e6cf] dark:focus:border-[#88d4ab] focus:bg-white dark:focus:bg-gray-600 focus:shadow-[0_0_0_3px_rgba(168,230,207,0.1)] dark:focus:shadow-[0_0_0_3px_rgba(136,212,171,0.2)]" />
          </div>

          <!-- Password Field -->
          <div class="mb-7">
            <label for="password" class="block text-[0.95rem] font-semibold text-[#2c3e50] dark:text-white mb-2">
              Password
            </label>
            <div class="relative">
              <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
                placeholder="Enter your password..." required
                class="w-full px-4 py-3.5 text-base border-2 border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-[#2c3e50] dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-all duration-300 focus:outline-none focus:border-[#a8e6cf] dark:focus:border-[#88d4ab] focus:bg-white dark:focus:bg-gray-600 focus:shadow-[0_0_0_3px_rgba(168,230,207,0.1)] dark:focus:shadow-[0_0_0_3px_rgba(136,212,171,0.2)]" />
              <button type="button" (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-0 text-gray-500 dark:text-gray-400 cursor-pointer p-2 flex items-center justify-center transition-colors duration-200 hover:text-[#2c5f5d] dark:hover:text-[#a8e6cf]">
                <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-lg"></i>
              </button>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="flex justify-center w-full mt-4">
            <button type="submit" [disabled]="isLoading" [disabled]="!email || !password"
              class="items-center justify-center px-3 py-3 text-sm font-semibold bg-[#3E3D3D] dark:bg-[#a8e6cf] border-0 rounded-xl text-white dark:text-[#2c3e50] cursor-pointer transition-all duration-300 tracking-wider disabled:opacity-50 disabled:cursor-not-allowed enabled:hover:bg-[#234a48] dark:enabled:hover:bg-[#88d4ab] enabled:hover:-translate-y-0.5 enabled:hover:shadow-[0_8px_20px_rgba(44,95,93,0.3)] dark:enabled:hover:shadow-[0_8px_20px_rgba(168,230,207,0.3)]">
              {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
